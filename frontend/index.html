<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>芥末的面试</title>
<script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0e0e16; --card: #16161f; --surface: #1e1e2b;
    --accent: #7c6aff; --teal: #43e6b5; --red: #ff5555;
    --text: #d0d0e8; --muted: #55557a; --border: rgba(124,106,255,0.12);
    --radius: 14px;
  }
  body { font-family: -apple-system,'PingFang SC','Microsoft YaHei',sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  nav {
    position: fixed; top:0; left:0; right:0; z-index:100;
    display:flex; align-items:center; justify-content:space-between;
    padding: 14px 40px;
    background: rgba(14,14,22,0.9); backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--border);
  }
  .nav-logo { font-size:18px; font-weight:900; color:var(--text); }
  .nav-logo span { color:var(--accent); }
  .nav-links { display:flex; gap:20px; }
  .nav-links button {
    background:none; border:none; cursor:pointer; color:var(--muted);
    font-size:13px; font-weight:600; transition:color 0.2s;
  }
  .nav-links button:hover, .nav-links button.active { color:var(--accent); }

  main { padding: 80px 40px 40px; max-width: 860px; margin: 0 auto; }

  /* 页面切换 */
  .page { display:none; }
  .page.active { display:block; }

  /* 卡片 */
  .card {
    background: var(--card); border-radius: var(--radius);
    border: 1px solid var(--border); padding: 28px; margin-bottom: 20px;
  }
  .card-title { font-size:15px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:16px; }

  /* 表单 */
  textarea, input[type=text], select {
    width:100%; padding:12px 16px; border-radius:10px;
    border: 1.5px solid var(--border); background:var(--surface);
    color:var(--text); font-size:14px; outline:none;
    transition:border-color 0.2s; font-family:inherit; resize:vertical;
  }
  textarea::placeholder, input::placeholder { color:var(--muted); }
  textarea:focus, input:focus, select:focus { border-color:var(--accent); }
  select option { background:var(--surface); }

  label { font-size:13px; color:var(--muted); margin-bottom:6px; display:block; }

  .form-row { margin-bottom:16px; }
  .form-inline { display:flex; gap:12px; }
  .form-inline > div { flex:1; }

  /* 按钮 */
  .btn {
    padding:10px 24px; border-radius:50px; font-size:13px; font-weight:700;
    cursor:pointer; border:none; transition:all 0.2s;
  }
  .btn-primary { background:var(--accent); color:#fff; }
  .btn-primary:hover { opacity:0.85; transform:translateY(-1px); }
  .btn-primary:disabled { opacity:0.4; cursor:not-allowed; transform:none; }
  .btn-outline { background:transparent; color:var(--accent); border:1.5px solid var(--accent); }
  .btn-outline:hover { background:rgba(124,106,255,0.1); }
  .btn-danger { background:transparent; color:var(--red); border:1.5px solid var(--red); }
  .btn-danger:hover { background:rgba(255,85,85,0.1); }

  /* 题目列表 */
  .question-item {
    background:var(--surface); border-radius:10px; padding:16px 20px;
    margin-bottom:12px; border:1px solid var(--border);
    animation: fadeIn 0.3s ease;
  }
  .q-header { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
  .q-num {
    width:26px; height:26px; border-radius:50%; background:var(--accent);
    display:flex; align-items:center; justify-content:center;
    font-size:12px; font-weight:700; color:#fff; flex-shrink:0;
  }
  .q-text { font-size:14px; font-weight:600; flex:1; }
  .q-status { font-size:11px; font-weight:700; padding:3px 10px; border-radius:50px; flex-shrink:0; }
  .q-status.done { background:rgba(67,230,181,0.15); color:var(--teal); }
  .q-status.pending { background:rgba(124,106,255,0.1); color:var(--accent); }

  .answer-area { margin-top:10px; }
  .answer-area textarea { height:90px; }
  .answer-actions { display:flex; gap:8px; margin-top:8px; }

  .feedback-box {
    margin-top:12px; padding:14px 16px;
    background:var(--card); border-radius:10px; border:1px solid var(--border);
    font-size:13px; line-height:1.8;
  }
  .feedback-box p { margin:0 0 6px; }
  .feedback-box p:last-child { margin:0; }
  .feedback-box strong { color:var(--accent); }
  .score-badge {
    display:inline-block; padding:2px 10px; border-radius:50px;
    font-size:12px; font-weight:700; margin-bottom:8px;
  }
  .score-high { background:rgba(67,230,181,0.2); color:var(--teal); }
  .score-mid { background:rgba(255,200,0,0.15); color:#ffc800; }
  .score-low { background:rgba(255,85,85,0.15); color:var(--red); }
  .streaming::after { content:'▌'; color:var(--accent); animation:blink 0.6s step-end infinite; }
  @keyframes blink { 50%{opacity:0;} }

  /* 历史记录 */
  .session-item {
    display:flex; align-items:center; gap:14px; padding:14px 18px;
    background:var(--surface); border-radius:10px; margin-bottom:10px;
    border:1px solid var(--border); cursor:pointer; transition:border-color 0.2s;
    animation: fadeIn 0.25s ease;
  }
  .session-item:hover { border-color:var(--accent); }
  .session-icon { font-size:22px; flex-shrink:0; }
  .session-info { flex:1; min-width:0; }
  .session-role { font-size:14px; font-weight:700; }
  .session-time { font-size:11px; color:var(--muted); margin-top:2px; }
  .session-del { background:none; border:none; cursor:pointer; color:var(--muted); font-size:18px; transition:color 0.2s; }
  .session-del:hover { color:var(--red); }

  /* 详情弹窗 */
  .modal-overlay {
    display:none; position:fixed; inset:0; z-index:200;
    background:rgba(0,0,0,0.65); backdrop-filter:blur(4px);
    align-items:flex-start; justify-content:center; padding:40px 16px;
  }
  .modal-overlay.open { display:flex; }
  .modal {
    background:var(--card); border-radius:var(--radius); border:1px solid var(--border);
    width:100%; max-width:760px; max-height:calc(100vh - 80px);
    display:flex; flex-direction:column; animation:fadeIn 0.2s ease;
  }
  .modal-header {
    display:flex; align-items:center; justify-content:space-between;
    padding:20px 24px; border-bottom:1px solid var(--border); flex-shrink:0;
  }
  .modal-header h2 { font-size:16px; font-weight:800; }
  .modal-close { background:none; border:none; cursor:pointer; color:var(--muted); font-size:22px; line-height:1; }
  .modal-close:hover { color:var(--text); }
  .modal-body { overflow-y:auto; padding:20px 24px; }
  .detail-q {
    background:var(--surface); border-radius:10px; padding:16px 20px;
    margin-bottom:14px; border:1px solid var(--border);
  }
  .detail-q-header { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
  .detail-q-text { font-size:14px; font-weight:600; flex:1; }
  .detail-answer { font-size:13px; color:var(--muted); margin-bottom:10px; line-height:1.7; white-space:pre-wrap; }
  .detail-feedback { font-size:13px; line-height:1.8; padding:12px 14px; background:var(--card); border-radius:8px; border:1px solid var(--border); }
  .no-answer { font-size:13px; color:var(--muted); font-style:italic; }

  /* 空状态 */
  .empty { text-align:center; padding:60px 20px; color:var(--muted); }
  .empty-icon { font-size:48px; margin-bottom:12px; }
  .empty p { font-size:14px; }

  /* 进度条 */
  .progress-bar { height:4px; background:var(--surface); border-radius:2px; margin-bottom:20px; overflow:hidden; }
  .progress-fill { height:100%; background:var(--accent); border-radius:2px; transition:width 0.4s ease; }

  @keyframes fadeIn { from{opacity:0;transform:translateY(6px);} to{opacity:1;transform:translateY(0);} }

  @media(max-width:600px) {
    nav { padding:12px 16px; }
    main { padding:70px 16px 30px; }
  }
</style>
</head>
<body>

<nav>
  <div class="nav-logo">芥末的<span>面试</span></div>
  <div class="nav-links">
    <button class="active" onclick="showPage('practice')">开始练习</button>
    <button onclick="showPage('history')">历史记录</button>
  </div>
</nav>

<main>
  <!-- 练习页 -->
  <div class="page active" id="page-practice">
    <div class="card" id="jd-form">
      <div class="card-title">输入岗位信息</div>
      <div class="form-inline">
        <div class="form-row">
          <label>岗位名称</label>
          <input type="text" id="role-input" placeholder="例：Python 后端开发实习生">
        </div>
        <div class="form-row">
          <label>题目数量</label>
          <select id="count-select">
            <option value="3">3 题（快速）</option>
            <option value="5" selected>5 题（标准）</option>
            <option value="8">8 题（全面）</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <label>岗位描述 / JD</label>
        <textarea id="jd-input" rows="5" placeholder="粘贴招聘 JD，或者简单描述岗位要求..."></textarea>
      </div>
      <button type="button" class="btn btn-primary" id="gen-btn" onclick="generateQuestions()">生成面试题 ✨</button>
    </div>

    <div id="session-area" style="display:none">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
        <div>
          <div style="font-size:18px;font-weight:800;" id="session-title"></div>
          <div style="font-size:13px;color:var(--muted);margin-top:2px;" id="session-progress"></div>
        </div>
        <button type="button" class="btn btn-outline" onclick="resetSession()">重新开始</button>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
      <div id="questions-list"></div>
    </div>
  </div>

  <!-- 历史页 -->
  <div class="page" id="page-history">
    <div class="card-title" style="margin-bottom:16px;">历史练习记录</div>
    <div id="history-list"></div>
  </div>
</main>

<!-- 详情弹窗 -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title"></h2>
      <button class="modal-close" onclick="closeModalDirect()">×</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
const API = 'http://127.0.0.1:8000';
let currentSession = null;
let answeredCount = 0;

function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  document.querySelectorAll('.nav-links button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  if (name === 'history') loadHistory();
}

// ── 生成题目 ───────────────────────────────────────────
async function generateQuestions() {
  const jd = document.getElementById('jd-input').value.trim();
  const role = document.getElementById('role-input').value.trim();
  const count = parseInt(document.getElementById('count-select').value);
  if (!jd) { alert('请输入岗位描述'); return; }

  const btn = document.getElementById('gen-btn');
  btn.disabled = true; btn.textContent = '生成中…';

  try {
    const r = await fetch(`${API}/session`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ jd, role_name: role, question_count: count }),
    });
    if (!r.ok) throw new Error('请求失败');
    const data = await r.json();
    currentSession = data;
    answeredCount = 0;
    renderSession(data);
  } catch(e) {
    alert('生成失败，请确认后端正在运行');
  } finally {
    btn.disabled = false; btn.textContent = '生成面试题 ✨';
  }
}

function renderSession(data) {
  document.getElementById('jd-form').style.display = 'none';
  document.getElementById('session-area').style.display = 'block';
  document.getElementById('session-title').textContent = data.role_name || '面试练习';
  updateProgress(data.questions.length);

  const list = document.getElementById('questions-list');
  list.innerHTML = '';
  data.questions.forEach((q, i) => {
    list.appendChild(createQuestionEl(q, i));
  });
}

function createQuestionEl(q, i) {
  const el = document.createElement('div');
  el.className = 'question-item';
  el.id = `q-${q.id}`;
  el.innerHTML = `
    <div class="q-header">
      <div class="q-num">${i + 1}</div>
      <div class="q-text">${q.question}</div>
      <div class="q-status pending" id="status-${q.id}">待回答</div>
    </div>
    <div class="answer-area">
      <textarea id="ans-${q.id}" placeholder="输入你的回答…" rows="3"></textarea>
      <div class="answer-actions">
        <button type="button" class="btn btn-primary" onclick="submitAnswer(${q.id})">提交回答</button>
        <button type="button" class="btn btn-outline" onclick="skipQuestion(${q.id})">跳过</button>
      </div>
    </div>
    <div id="feedback-${q.id}"></div>`;
  return el;
}

function updateProgress(total) {
  const pct = total ? Math.round(answeredCount / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('session-progress').textContent =
    `已完成 ${answeredCount} / ${currentSession?.questions?.length || total} 题`;
}

// ── 提交回答 ───────────────────────────────────────────
async function submitAnswer(qid) {
  const ans = document.getElementById(`ans-${qid}`).value.trim();
  if (!ans) { alert('请输入回答'); return; }

  const btn = document.querySelector(`#q-${qid} .btn-primary`);
  btn.disabled = true; btn.textContent = '评分中…';

  const feedbackEl = document.getElementById(`feedback-${qid}`);
  feedbackEl.innerHTML = '<div class="feedback-box"><span class="streaming"></span></div>';
  const box = feedbackEl.querySelector('.feedback-box');

  try {
    const r = await fetch(`${API}/answer-stream`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question_id: qid, answer: ans }),
    });

    const reader = r.body.getReader();
    const decoder = new TextDecoder();
    let fullText = ''; let leftover = '';

    outer: while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      leftover += decoder.decode(value, { stream: true });
      const lines = leftover.split('\n');
      leftover = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const payload = line.slice(6).trim();
        if (payload === '[DONE]') break outer;
        try { fullText += JSON.parse(payload).t; box.textContent = fullText; } catch {}
      }
    }

    // 渲染 markdown
    box.classList.remove('streaming');
    box.innerHTML = marked.parse(fullText);

    // 解析评分显示徽章
    const scoreMatch = fullText.match(/【评分】(\d+)\/10/);
    if (scoreMatch) {
      const s = parseInt(scoreMatch[1]);
      const cls = s >= 8 ? 'score-high' : s >= 5 ? 'score-mid' : 'score-low';
      const badge = document.createElement('div');
      badge.className = `score-badge ${cls}`;
      badge.textContent = `评分 ${s}/10`;
      box.prepend(badge);
    }

    // 标记完成
    document.getElementById(`status-${qid}`).className = 'q-status done';
    document.getElementById(`status-${qid}`).textContent = '已完成';
    document.querySelector(`#q-${qid} .answer-actions`).style.display = 'none';
    answeredCount++;
    updateProgress(currentSession.questions.length);

  } catch(e) {
    box.innerHTML = '<span style="color:var(--red)">评分失败，请检查后端</span>';
  } finally {
    btn.disabled = false; btn.textContent = '提交回答';
  }
}

function skipQuestion(qid) {
  document.getElementById(`status-${qid}`).className = 'q-status pending';
  document.getElementById(`status-${qid}`).textContent = '已跳过';
  document.querySelector(`#q-${qid} .answer-actions`).style.display = 'none';
  answeredCount++;
  updateProgress(currentSession.questions.length);
}

function resetSession() {
  currentSession = null; answeredCount = 0;
  document.getElementById('jd-form').style.display = 'block';
  document.getElementById('session-area').style.display = 'none';
  document.getElementById('jd-input').value = '';
  document.getElementById('role-input').value = '';
}

// ── 历史记录 ───────────────────────────────────────────
async function loadHistory() {
  const list = document.getElementById('history-list');
  list.innerHTML = '<div style="color:var(--muted);font-size:13px">加载中…</div>';
  try {
    const r = await fetch(`${API}/sessions`);
    const sessions = await r.json();
    if (!sessions.length) {
      list.innerHTML = '<div class="empty"><div class="empty-icon">📭</div><p>还没有练习记录</p></div>';
      return;
    }
    list.innerHTML = '';
    sessions.forEach(s => {
      const el = document.createElement('div');
      el.className = 'session-item';
      el.innerHTML = `
        <div class="session-icon">🎯</div>
        <div class="session-info">
          <div class="session-role">${s.role_name || '未命名练习'}</div>
          <div class="session-time">${new Date(s.created_at).toLocaleString('zh-CN')}</div>
        </div>
        <button type="button" class="session-del" onclick="deleteSession(event,${s.id})">×</button>`;
      el.addEventListener('click', () => openSession(s.id));
      list.appendChild(el);
    });
  } catch {
    list.innerHTML = '<div style="color:var(--red);font-size:13px">加载失败，请确认后端运行</div>';
  }
}

async function deleteSession(e, id) {
  e.stopPropagation();
  if (!confirm('删除这条记录？')) return;
  await fetch(`${API}/session/${id}`, { method: 'DELETE' });
  loadHistory();
}

// ── 历史详情弹窗 ────────────────────────────────────────
async function openSession(id) {
  const overlay = document.getElementById('modal-overlay');
  const body = document.getElementById('modal-body');
  const title = document.getElementById('modal-title');
  title.textContent = '加载中…';
  body.innerHTML = '';
  overlay.classList.add('open');

  try {
    const r = await fetch(`${API}/session/${id}`);
    if (!r.ok) throw new Error();
    const { session, questions } = await r.json();
    title.textContent = session.role_name || '未命名练习';

    questions.forEach((q, i) => {
      const a = q.answer;
      const scoreHtml = a?.score != null
        ? (() => {
            const s = a.score;
            const cls = s >= 8 ? 'score-high' : s >= 5 ? 'score-mid' : 'score-low';
            return `<span class="score-badge ${cls}" style="margin-bottom:8px;display:inline-block">评分 ${s}/10</span>`;
          })()
        : '';

      const el = document.createElement('div');
      el.className = 'detail-q';
      el.innerHTML = `
        <div class="detail-q-header">
          <div class="q-num">${i + 1}</div>
          <div class="detail-q-text">${q.question}</div>
        </div>
        ${a ? `
          <div class="detail-answer">我的回答：${a.answer || '（已跳过）'}</div>
          ${scoreHtml}
          <div class="detail-feedback">${marked.parse(a.feedback || '')}</div>
        ` : '<div class="no-answer">未作答</div>'}`;
      body.appendChild(el);
    });
  } catch {
    body.innerHTML = '<div style="color:var(--red);font-size:13px">加载失败</div>';
    title.textContent = '出错了';
  }
}

function closeModal(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('modal-overlay').classList.remove('open');
}
</script>
</body>
</html>
